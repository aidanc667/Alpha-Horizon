# Requires the ANTHROPIC_API_KEY repo secret to be set (Settings -> Secrets and
# variables -> Actions -> New repository secret) for this workflow to function.
#
# This analyzes THIS repo using Archie (github.com/aidanc667/archie), fetched
# and built as a separate step below -- not this repo's own build.
name: Archie PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  archie-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Archie
        uses: actions/checkout@v4
        with:
          repository: aidanc667/archie
          path: archie-tool

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Archie dependencies
        working-directory: archie-tool
        run: npm ci

      - name: Build Archie
        working-directory: archie-tool
        run: npm run build

      - name: Run Archie analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node archie-tool/dist/cli.js analyze . --diff ${{ github.event.pull_request.base.sha }} --json > archie-output.json

      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node archie-tool/scripts/post-pr-comment.mjs archie-output.json
